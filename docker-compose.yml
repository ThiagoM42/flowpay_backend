services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app_flowpay
        volumes:
            - .:/var/www
        networks:
            - laravel
        restart: always
        depends_on:
            - postgres
            - redis

    webserver:
        image: nginx:stable-alpine
        container_name: laravel_webserver_flowpay
        ports:
            - "8000:80"
        volumes:
            - .:/var/www
            - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - laravel
        depends_on:
            - app

    postgres:
        image: postgres:17
        container_name: laravel_postgres_flowpay
        restart: always
        environment:
            POSTGRES_DB: laravel
            POSTGRES_USER: laravel
            POSTGRES_PASSWORD: secret
        ports:
            - "5433:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - laravel

    pgadmin:
        image: dpage/pgadmin4
        container_name: laravel_pgadmin_flowpay
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@admin.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        networks:
            - laravel
        depends_on:
            - postgres
    redis:
        image: redis:latest
        container_name: laravel_redis_flowpay
        ports:
            - "6380:6379"
        networks:
            - laravel
        restart: always

    minio:
        image: minio/minio:RELEASE.2025-02-03T21-03-04Z-cpuv1
        container_name: laravel_minio_flowpay
        command: server /data --console-address ":9003"
        environment:
            MINIO_ROOT_USER: minio
            MINIO_ROOT_PASSWORD: minio123
        ports:
            - "9002:9002"
            - "9003:9003"
        volumes:
            - minio_data:/data
        healthcheck:
            test:
                - CMD
                - mc
                - ready
                - local
            retries: 3
            timeout: 5s            
        networks:
            - laravel
        restart: always
volumes:
    pgdata: {}
    minio_data: {}

networks:
    laravel:
        driver: bridge
